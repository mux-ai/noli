  - id: integrations/pi-coding-agent
    type: Agent Integration
    title: Pi Coding Agent Integration
    description: A project-local or user-global TypeScript extension, shared skill, and guidance exposing five bounded native Noli read tools to Pi.
    tags: [pi, agents, integration, typescript]
    attributes:
      implementation_paths: [integrations/pi]
      tools: [noli_status, noli_search, noli_retrieve, noli_get, noli_graph]
      verified_api: "0.80"
    sections:
      - heading: Usage
        content: >-
          Run `integrations/pi/install.sh` for a target repository, or pass
          `--global` to install the extension, starter templates, shared
          skill, and managed first-run guidance for the current user across
          repositories. Ensure `noli` is on PATH or set an absolute
          `NOLI_BINARY_PATH`. On session start in an undecided repository the
          extension shows the first-run Yes/No dialog without blocking
          startup: Yes bootstraps and validates a starter knowledge base, No
          writes the `.noli/disabled` sentinel, and dismissal asks again next
          session. The extension rejects shell execution, path escapes,
          invalid protocol output, timeout, cancellation, and output
          overflow. Run the Pi uninstaller with `--global` to safely remove
          its native assets and release its ownership of the shared skill.
    relationships:
      - predicate: uses
        to: Noli CLI
      - predicate: uses
        to: Frozen JSON Protocol
      - predicate: enforced-by
        to: Repository Path Containment
      - predicate: follows
        to: Native Pi Tool Extension
      - predicate: enforced-by
        to: Agent Global First-Run Choice
      - predicate: enforced-by
        to: Safe Agent Integration Removal
